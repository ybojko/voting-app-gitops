apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-password
  namespace: voting
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: postgres-password
  data:
    - secretKey: postgres-password
      remoteRef:
        key: {{ .Values.postgresPassword.secretKey }}
---
