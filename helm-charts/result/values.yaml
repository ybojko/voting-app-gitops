replicaCount: 1

image:
  repository: ghcr.io/ybojko/voting-app-result
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

httproute:
  enabled: true
  gatewayName: voting-app-gateway
  gatewayNamespace: voting
  hostname: result.redf1ag.xyz

env:
  DB_HOST: postgres-postgresql
  DB_PORT: "5432"
  DB_USER: postgres
  DB_NAME: postgres

existingSecret: ""

secretEnv: {}
# Example:
# secretEnv:
#   DB_PASSWORD:
#     secretName: postgres-password
#     key: postgres-password

resources: {}
