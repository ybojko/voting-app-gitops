replicaCount: 1

image:
  repository: ghcr.io/ybojko/voting-app-result
  tag: v2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  hostname: result.redf1ag.xyz

env:
  DB_HOST: postgres-postgresql
  DB_PORT: "5432"
  DB_USER: postgres
  DB_NAME: postgres

existingSecret: ""

secretEnv: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
