apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: keycloak
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/keycloak/data/transaction-logs
              chown -R 1000:0 /opt/keycloak/data
              chmod -R 770 /opt/keycloak/data
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
      securityContext:
        fsGroup: 1000
      volumes:
        - name: realm-import
          secret:
            secretName: voting-app-realm
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/keycloak/bin/kc.sh
            - start
            - --import-realm
            - --proxy-headers=xforwarded
            - --http-enabled=true
            - --db=postgres
            - --db-url-host={{ .Values.database.host }}
            - --db-url-port={{ .Values.database.port }}
            - --db-url-database={{ .Values.database.database }}
            - --hostname-strict=false
          ports:
            - name: http
              containerPort: 8080
            - name: http-management
              containerPort: 9000
          env:
            - name: KC_HOSTNAME
              value: {{ .Values.hostname | default "keycloak.redf1ag.xyz" | quote }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ .Values.database.host | quote }}
            - name: KC_DB_URL_PORT
              value: {{ .Values.database.port | quote }}
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.database.database | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretPasswordKey }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-initial-admin
                  key: password
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 0
          volumeMounts:
  {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /opt/keycloak/data
  {{- end }}
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
