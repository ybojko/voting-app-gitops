{{- $existing := lookup "v1" "Secret" .Release.Namespace "keycloak-initial-admin" }}
{{- if $existing }}
{{- /* Secret already exists, skip to preserve admin password */}}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-initial-admin
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ randAlphaNum 20 | quote }}
{{- end }}
