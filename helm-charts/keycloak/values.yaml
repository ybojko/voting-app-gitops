replicaCount: 1
image:
  repository: quay.io/keycloak/keycloak
  tag: "26.1"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
persistence:
  enabled: true
  size: 1Gi
  storageClass: gp2
database:
  vendor: postgres
  host: postgres-postgresql.voting.svc.cluster.local
  port: 5432
  database: keycloak
  username: postgres
  existingSecret: postgres-password
  existingSecretPasswordKey: postgres-password
resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: 500m
    memory: 1536Mi
