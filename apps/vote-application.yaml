apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vote
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/ybojko/voting-app-gitops.git
    targetRevision: HEAD
    path: helm-charts/vote
    helm:
      values: |
        replicaCount: 1
        image:
          repository: ghcr.io/ybojko/voting-app-vote
          tag: v1
          pullPolicy: IfNotPresent
        service:
          type: NodePort
          port: 80
          nodePort: 30080
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
        imagePullSecrets:
          - name: ghcr-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: voting
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
