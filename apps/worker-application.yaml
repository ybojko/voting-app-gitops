apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: worker
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/ybojko/voting-app-gitops.git
    targetRevision: HEAD
    path: helm-charts/worker
    helm:
      values: |
        replicaCount: 1
        image:
          repository: 522868276919.dkr.ecr.eu-central-1.amazonaws.com/voting-app-worker
          tag: latest
          pullPolicy: IfNotPresent
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          DB_HOST: postgres-postgresql
          DB_PORT: "5432"
          DB_USER: postgres
          DB_NAME: postgres
        secretEnv:
          DB_PASSWORD:
            secretName: postgres-password
            key: postgres-password
  destination:
    server: https://kubernetes.default.svc
    namespace: voting
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
