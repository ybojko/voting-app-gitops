apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: external-dns
    targetRevision: 9.0.x
    helm:
      values: |
        provider: cloudflare
        image:
          registry: registry.k8s.io
          repository: external-dns/external-dns
          tag: v0.14.2
        global:
          security:
            allowInsecureImages: true
        cloudflare:
          secretName: cloudflare-api-token
          proxied: false
        policy: sync
        sources:
          - gateway-httproute
        domainFilters:
          - redf1ag.xyz
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
