# This Secret is now managed by External Secrets Operator (ESO).
# See eso-external-secrets helm chart: templates/external-secrets.yaml
# The ExternalSecret in argocd namespace syncs the GitHub token from AWS Secrets Manager.
#
# To bootstrap: after ESO is running, ArgoCD will sync the ExternalSecret
# which creates this Secret automatically. No manual kubectl apply needed.
#
# If bootstrapping from scratch without ESO, create a temporary secret:
#   kubectl create secret generic repo-voting-app-gitops \
#     -n argocd \
#     --from-literal=type=git \
#     --from-literal=url=https://github.com/ybojko/voting-app-gitops.git \
#     --from-literal=username=ybojko \
#     --from-literal=password=<GITHUB_TOKEN>
#   kubectl label secret repo-voting-app-gitops -n argocd argocd.argoproj.io/secret-type=repository
