apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-route
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/ybojko/voting-app-gitops.git
    targetRevision: HEAD
    path: helm-charts/keycloak-route
    helm:
      values: |
        hostname: keycloak.voting.local
        serviceName: keycloak
        servicePort: 8080
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
