apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-route
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/ybojko/voting-app-gitops.git
    targetRevision: HEAD
    path: helm-charts/grafana-route
    helm:
      values: |
        hostname: grafana.voting.local
        serviceName: monitoring-grafana
        servicePort: 80
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
